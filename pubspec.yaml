name: sensors
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  liquid_glass_widgets: ^0.21.5
  http: ^1.6.0
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.png"

  # Android adaptive icon
  adaptive_icon_foreground: "logo.png"
  adaptive_icon_background: "#FFFFFF"

  min_sdk_android: 21

flutter:
  uses-material-design: true